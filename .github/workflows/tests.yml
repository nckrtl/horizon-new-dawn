name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Horizon ${{ matrix.horizon }}
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '12.38 minimum / Horizon 5.46 minimum'
            framework: '12.38.0'
            horizon: '5.46.0'
            pest: '4.0.0'
            pest_browser: '4.0.0'
            pest_plugin_laravel: '4.0.0'
            testbench: '10.7.0'
            without-boost: true
          - php: '8.4'
            laravel: '12.40.1 (pause disabled)'
            framework: '12.40.1'
            horizon: '5.46.0'
            pest: '4.0.0'
            pest_browser: '4.0.0'
            pest_plugin_laravel: '4.0.0'
            testbench: '10.10.0'
            without-boost: true
          - php: '8.4'
            laravel: '12.40.2 (pause enabled)'
            framework: '12.40.2'
            horizon: '5.46.0'
            pest: '4.0.0'
            pest_browser: '4.0.0'
            pest_plugin_laravel: '4.0.0'
            testbench: '10.10.0'
            without-boost: true
          - php: '8.4'
            laravel: '12 latest / Horizon 5.46 minimum'
            framework: '^12.0'
            horizon: '5.46.0'
            pest: '^4.0'
            pest_browser: '^4.3'
            pest_plugin_laravel: '^4.0'
            testbench: '^10.0'
            without-boost: false
          - php: '8.4'
            laravel: '12 latest / latest Horizon'
            framework: '^12.0'
            horizon: '^5.46.0'
            pest: '^4.0'
            pest_browser: '^4.3'
            pest_plugin_laravel: '^4.0'
            testbench: '^10.0'
            without-boost: false
          - php: '8.3'
            laravel: '13 minimum / Horizon 5.46 minimum'
            framework: '13.0.0'
            horizon: '5.46.0'
            pest: '4.4.5'
            pest_browser: '4.3.1'
            pest_plugin_laravel: '4.1.0'
            testbench: '11.0.0'
            without-boost: false
          - php: '8.5'
            laravel: '13 latest / Horizon 5.46 minimum'
            framework: '^13.0'
            horizon: '5.46.0'
            pest: '^4.0'
            pest_browser: '^4.3'
            pest_plugin_laravel: '^4.0'
            testbench: '^11.0'
            without-boost: false
          - php: '8.5'
            laravel: '13 latest / latest Horizon'
            framework: '^13.0'
            horizon: '^5.46.0'
            pest: '^4.0'
            pest_browser: '^4.3'
            pest_plugin_laravel: '^4.0'
            testbench: '^11.0'
            without-boost: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Remove development packages that narrow the boundary
        if: matrix.without-boost
        run: composer remove --dev laravel/boost --no-interaction --no-update

      - name: Select Laravel version
        run: |
          composer require "laravel/framework:${{ matrix.framework }}" --no-interaction --no-update
          composer require "laravel/horizon:${{ matrix.horizon }}" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer require --dev "pestphp/pest:${{ matrix.pest }}" --no-interaction --no-update
          composer require --dev "pestphp/pest-plugin-browser:${{ matrix.pest_browser }}" --no-interaction --no-update
          composer require --dev "pestphp/pest-plugin-laravel:${{ matrix.pest_plugin_laravel }}" --no-interaction --no-update

      - name: Install Composer dependencies
        run: composer update --with-all-dependencies --no-security-blocking --no-interaction --no-progress --prefer-dist

      - name: Show resolved compatibility versions
        run: php -r 'require "vendor/autoload.php"; echo PHP_VERSION, " Laravel ", Composer\InstalledVersions::getPrettyVersion("laravel/framework"), " Horizon ", Composer\InstalledVersions::getPrettyVersion("laravel/horizon"), PHP_EOL;'

      - name: Test PHP compatibility
        run: composer test

      - name: Smoke-test a real Horizon worker
        env:
          HORIZON_COMPATIBILITY_REDIS_DB: 15
          HORIZON_COMPATIBILITY_REDIS_HOST: 127.0.0.1
          HORIZON_COMPATIBILITY_REDIS_PORT: 6379
        run: composer test:compatibility

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer package metadata
        run: composer validate --strict

      - name: Audit Composer dependencies
        run: composer audit --locked --no-interaction

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        run: bun audit

      - name: Build frontend
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Verify PHP
        run: composer quality

      - name: Verify frontend formatting
        run: bun run format:check

      - name: Lint frontend
        run: bun run lint

      - name: Test frontend
        run: bun run test

      - name: Type-check frontend
        run: bun run typecheck

      - name: Verify generated assets
        run: git diff --exit-code -- dist/build resources/js/generated

  auto-release:
    needs:
      - compatibility
      - tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: version
        shell: bash
        run: |
          latest="$(git tag --list --sort=-version:refname | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"

          if [[ -z "$latest" ]]; then
            next="0.1.0"
          else
            IFS='.' read -r major minor patch <<< "$latest"
            next="${major}.${minor}.$((patch + 1))"
          fi

          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT_VERSION"
          git push origin "$NEXT_VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: gh release create "$NEXT_VERSION" --verify-tag --generate-notes --title "$NEXT_VERSION"
